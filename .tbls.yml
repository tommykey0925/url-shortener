# tbls configuration for DynamoDB schema documentation.
#
# IMPORTANT: tbls の DynamoDB driver は DSN クエリの endpoint パラメータを認識しない。
# DynamoDB Local に接続するには AWS_ENDPOINT_URL=http://localhost:8000 を環境変数で
# 併用すること。Makefile の `db-docs` ターゲット経由で実行するのが正規の手順。
#
# `tbls doc` を素手で打つと AWS 本番に誤接続する可能性があるため、必ず `make db-docs`
# を使うこと。詳細は docs-db/README.md。

dsn: dynamo://ap-northeast-1?aws_access_key_id=local&aws_secret_access_key=local

docPath: docs-db/schema

format:
  adjust: true
  sort: false

include:
  - url-shortener
  - url-shortener-stats

# tbls の DynamoDB driver は DescribeTable の AttributeDefinitions しかカラム化しない。
# url-shortener (PK=code) と url-shortener-stats (PK=code, SK=date) しか出力されない。
# 実アイテムの属性 (original_url, created_at, clicks, safe_status, daily clicks) は
# tbls 出力に登場しない。手書き docs-db/entities.md / access-patterns.md で補完する。
#
# 本番 url-shortener テーブルは PROVISIONED billing (read=2, write=1) だが、
# ローカル / CI の DynamoDB Local では PAY_PER_REQUEST で作成する (DynamoDB Local が
# PROVISIONED の throughput exceeded エラーを再現する関係上)。tbls 出力の Billing
# Mode 表記はローカル / CI 状態 (PAY_PER_REQUEST) を反映するため、本番との差分は
# 以下の tableComment と docs-db/README.md で補足する。
comments:
  - table: url-shortener
    tableComment: |
      URL shortening codes. PK only. Production billing: PROVISIONED (read=2, write=1).
      Local/CI: PAY_PER_REQUEST. See ../entities.md for full attribute definitions.
    columnComments:
      code:
        Partition key. URL-safe short code (random or generated). Used as the public path /r/{code}.
  - table: url-shortener-stats
    tableComment: |
      Daily click stats per URL. PAY_PER_REQUEST. Composite key for time-series queries via begins_with on date.
      See ../entities.md and ../access-patterns.md.
    columnComments:
      code:
        Partition key. References url-shortener.code (no FK in DynamoDB).
      date:
        Sort key. ISO date YYYY-MM-DD. Query with begins_with for date range.
