name: DB Schema Docs Drift

# tbls diff で docs/db/schema/ と live DynamoDB Local の差分を検出する。
# 守備範囲: PK/SK の型変更 / テーブル追加削除 / .tbls.yml の comment 変更が
# 反映されてないケース。手書きの entities.md / access-patterns.md は対象外。

on:
  pull_request:
    paths:
      - "infra/dynamodb.tf"
      - "api/store/store.go"
      - "api/model/url.go"
      - ".tbls.yml"
      - "docs/db/schema/**"
      - ".github/workflows/db-docs.yaml"
  workflow_dispatch:

jobs:
  drift:
    runs-on: ubuntu-latest
    services:
      dynamodb:
        image: amazon/dynamodb-local:latest
        ports: ["8000:8000"]
        # NOTE: amazon/dynamodb-local image はシェルなしのため services.options で
        # --health-cmd を渡せない。後続ステップで wait ループする。
    env:
      AWS_ENDPOINT_URL: http://localhost:8000
      AWS_DEFAULT_REGION: ap-northeast-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      TBLS_VERSION: v1.94.5
    steps:
      - uses: actions/checkout@v4

      - name: Wait for DynamoDB Local
        run: |
          for i in {1..30}; do
            curl -s http://localhost:8000 > /dev/null && exit 0
            sleep 1
          done
          echo "DynamoDB Local did not start within 30s"
          exit 1

      # NOTE: 同じ create-table 定義が以下にもある:
      #   - Makefile の db ターゲット
      # いずれかを変更したら必ず両方を同期すること。
      # 本番 url-shortener は PROVISIONED billing だが、Local/CI では PAY_PER_REQUEST で作る。
      - name: Create url-shortener table
        run: |
          aws dynamodb create-table \
            --table-name url-shortener \
            --attribute-definitions AttributeName=code,AttributeType=S \
            --key-schema AttributeName=code,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --endpoint-url http://localhost:8000

      - name: Create url-shortener-stats table
        run: |
          aws dynamodb create-table \
            --table-name url-shortener-stats \
            --attribute-definitions \
              AttributeName=code,AttributeType=S \
              AttributeName=date,AttributeType=S \
            --key-schema \
              AttributeName=code,KeyType=HASH \
              AttributeName=date,KeyType=RANGE \
            --billing-mode PAY_PER_REQUEST \
            --endpoint-url http://localhost:8000

      - name: Install tbls
        run: |
          curl -sSL "https://github.com/k1LoW/tbls/releases/download/${TBLS_VERSION}/tbls_${TBLS_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin tbls
          tbls version

      - name: Check drift (tbls diff)
        run: tbls diff
