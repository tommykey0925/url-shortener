name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "api/**"
      - "web/**"

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: flox/install-flox-action@main

      - name: Build and test
        run: |
          flox activate -- bash -c '
            cd api
            go vet ./...
            go test ./...
            go build -o /dev/null .
          '

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: flox/install-flox-action@main

      - name: Build SvelteKit
        run: |
          flox activate -- bash -c '
            cd web
            pnpm install --frozen-lockfile
            pnpm build
          '
