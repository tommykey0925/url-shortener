name: CI

on:
  pull_request:
    branches: [main]
  merge_group:

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Build and test
        run: |
          cd api
          go vet ./...
          go test ./...
          go build -o /dev/null .

  integration-test-api:
    runs-on: ubuntu-latest
    services:
      dynamodb-local:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Integration tests
        run: |
          cd api
          go test -tags integration -v ./store/... ./cmd/monitor/...

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build SvelteKit
        run: |
          cd web
          pnpm install --frozen-lockfile
          pnpm build

  terraform-plan:
    runs-on: ubuntu-latest
    env:
      TF_VAR_groq_api_key: ${{ secrets.GROQ_API_KEY }}
      TF_VAR_google_safe_browsing_api_key: ${{ secrets.GOOGLE_SAFE_BROWSING_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - uses: tommykey-apps/.github/.github/actions/terraform-plan@v1
        with:
          working-directory: infra
