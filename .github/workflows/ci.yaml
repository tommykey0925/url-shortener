name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "api/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: flox/install-flox-action@main

      - name: Build and test
        run: |
          flox activate -- bash -c '
            cd api
            go vet ./...
            go test ./...
            go build -o /dev/null .
          '
