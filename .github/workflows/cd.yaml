name: CD

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "web/**"
      - "infra/**"
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-1
  LAMBDA_FUNCTION: url-shortener-api

permissions:
  contents: read

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'infra/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Apply
        run: |
          cd infra
          terraform init
          terraform apply -input=false -auto-approve

  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod

      - name: Build Lambda binary
        run: |
          cd api
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o bootstrap .
          zip lambda.zip bootstrap

      - name: Deploy API Lambda
        run: |
          aws lambda update-function-code \
            --function-name url-shortener-api \
            --zip-file fileb://api/lambda.zip

      - name: Build Monitor Lambda
        run: |
          cd api
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o bootstrap ./cmd/monitor/
          zip monitor.zip bootstrap

      - name: Deploy Monitor Lambda
        run: |
          aws lambda update-function-code \
            --function-name url-shortener-monitor \
            --zip-file fileb://api/monitor.zip

  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build SvelteKit
        run: cd web && pnpm install --frozen-lockfile && pnpm build

      - name: Get deployment parameters from SSM
        id: params
        run: |
          echo "cloudfront_id=$(aws ssm get-parameter --name /url-shortener/cloudfront-distribution-id --query 'Parameter.Value' --output text)" >> $GITHUB_OUTPUT
          echo "frontend_bucket=$(aws ssm get-parameter --name /url-shortener/frontend-bucket --query 'Parameter.Value' --output text)" >> $GITHUB_OUTPUT

      - name: Deploy to S3
        run: aws s3 sync web/build/ s3://${{ steps.params.outputs.frontend_bucket }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.params.outputs.cloudfront_id }} \
            --paths "/*"
