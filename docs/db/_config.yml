title: URL Shortener DB Schema
description: tbls 自動生成 + 手書き補足 (DynamoDB 2 テーブル設計)
theme: jekyll-theme-cayman
markdown: kramdown

# サブパス (/<repo>/db/) で配信されるため明示的に baseurl を指定。
# 未設定だと github-metadata gem が repo 名 (/url-shortener) を auto-set し、
# /db/ が抜けたリンクが生成される。
baseurl: /url-shortener/db

# .md リンクを Jekyll ビルド時に .html に自動変換 (GitHub UI 上でも .md として動くまま、Pages でも 200)
plugins:
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true
